services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: retailnexus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5150:5150"
    environment:
      ConnectionStrings__Default: "Host=db;Port=5432;Database=retailnexus;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      Jwt__Issuer: "RetailNexus"
      Jwt__Audience: "RetailNexus"
      Jwt__AccessTokenMinutes: "30"
      ASPNETCORE_ENVIRONMENT: "Development"
      Cors__AllowedOrigins__0: "http://localhost:3000"
      Cors__AllowedOrigins__1: ${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["dotnet", "RetailNexus.Api.dll"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5150}
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
